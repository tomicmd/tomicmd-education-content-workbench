<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育内容策略优化工作台</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>内容创作工作台</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-tab="chat">
                    <i class="fas fa-comments"></i>
                    <span>对话创作</span>
                </a>
                <a href="#" class="nav-item" data-tab="topics">
                    <i class="fas fa-lightbulb"></i>
                    <span>选题管理</span>
                </a>
                <a href="#" class="nav-item" data-tab="outlines">
                    <i class="fas fa-list-ol"></i>
                    <span>提纲编辑</span>
                </a>
                <a href="#" class="nav-item" data-tab="articles">
                    <i class="fas fa-file-alt"></i>
                    <span>文章管理</span>
                </a>
                <a href="#" class="nav-item" data-tab="history">
                    <i class="fas fa-history"></i>
                    <span>历史记录</span>
                </a>
            </nav>
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-details">
                    <span class="user-name">用户</span>
                    <span class="user-role">内容创作者</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 对话创作标签页 -->
            <div class="tab-content active" id="chat-tab">
                <div class="chat-container">
                    <div class="chat-header">
                        <h2><i class="fas fa-robot"></i> AI 助手</h2>
                        <div class="chat-actions">
                            <button class="btn btn-secondary" onclick="clearChat()">
                                <i class="fas fa-trash"></i> 清空对话
                            </button>
                            <button class="btn btn-primary" onclick="exportChat()">
                                <i class="fas fa-download"></i> 导出对话
                            </button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai-message">
                            <div class="message-avatar">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="message-content">
                                <p>你好！我是你的教育内容策略优化助手。我可以帮你：</p>
                                <ul>
                                    <li>📝 生成择校内容选题（闵行/浦东/徐汇）</li>
                                    <li>📋 创建结构化提纲</li>
                                    <li>🔍 查找权威参考资源</li>
                                    <li>✍️ 生成完整文章</li>
                                </ul>
                                <p>请告诉我你想做什么？</p>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <div class="quick-actions">
                            <button class="quick-btn" onclick="quickAction('生成浦东区5个择校选题')">
                                📝 生成选题
                            </button>
                            <button class="quick-btn" onclick="quickAction('创建提纲')">
                                📋 创建提纲
                            </button>
                            <button class="quick-btn" onclick="quickAction('查找参考资源')">
                                🔍 查找资源
                            </button>
                            <button class="quick-btn" onclick="quickAction('生成文章')">
                                ✍️ 生成文章
                            </button>
                        </div>
                        <div class="input-wrapper">
                            <textarea id="userInput" placeholder="请输入你的需求... 例如：为浦东区生成5个择校选题" rows="3"></textarea>
                            <button class="send-btn" onclick="sendMessage()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 选题管理标签页 -->
            <div class="tab-content" id="topics-tab">
                <div class="content-header">
                    <h2><i class="fas fa-lightbulb"></i> 选题管理</h2>
                    <div class="header-actions">
                        <button class="btn btn-primary" onclick="generateTopics()">
                            <i class="fas fa-plus"></i> 生成新选题
                        </button>
                        <button class="btn btn-secondary" onclick="saveAllTopics()">
                            <i class="fas fa-save"></i> 保存全部
                        </button>
                    </div>
                </div>
                <div class="topics-grid" id="topicsGrid">
                    <!-- 选题卡片将在这里动态生成 -->
                </div>
            </div>

            <!-- 提纲编辑标签页 -->
            <div class="tab-content" id="outlines-tab">
                <div class="content-header">
                    <h2><i class="fas fa-list-ol"></i> 提纲编辑</h2>
                    <div class="header-actions">
                        <button class="btn btn-primary" onclick="createOutline()">
                            <i class="fas fa-plus"></i> 创建新提纲
                        </button>
                        <button class="btn btn-success" onclick="exportOutline()">
                            <i class="fas fa-download"></i> 导出提纲
                        </button>
                    </div>
                </div>
                <div class="outline-editor" id="outlineEditor">
                    <div class="editor-placeholder">
                        <i class="fas fa-edit"></i>
                        <p>选择一个选题或创建新提纲开始编辑</p>
                    </div>
                </div>
            </div>

            <!-- 文章管理标签页 -->
            <div class="tab-content" id="articles-tab">
                <div class="content-header">
                    <h2><i class="fas fa-file-alt"></i> 文章管理</h2>
                    <div class="header-actions">
                        <button class="btn btn-primary" onclick="generateArticle()">
                            <i class="fas fa-magic"></i> 生成文章
                        </button>
                        <button class="btn btn-success" onclick="exportArticle()">
                            <i class="fas fa-download"></i> 导出文章
                        </button>
                    </div>
                </div>
                <div class="article-list" id="articleList">
                    <!-- 文章列表将在这里动态生成 -->
                </div>
            </div>

            <!-- 历史记录标签页 -->
            <div class="tab-content" id="history-tab">
                <div class="content-header">
                    <h2><i class="fas fa-history"></i> 历史记录</h2>
                    <div class="header-actions">
                        <button class="btn btn-secondary" onclick="clearHistory()">
                            <i class="fas fa-trash"></i> 清空历史
                        </button>
                        <button class="btn btn-primary" onclick="exportHistory()">
                            <i class="fas fa-download"></i> 导出记录
                        </button>
                    </div>
                </div>
                <div class="history-list" id="historyList">
                    <!-- 历史记录将在这里动态生成 -->
                </div>
            </div>
        </main>
    </div>

    <!-- 参考资源弹窗 -->
    <div class="modal" id="resourcesModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-link"></i> 参考资源</h3>
                <button class="close-btn" onclick="closeModal('resourcesModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="resourcesList">
                    <!-- 资源列表将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>AI正在思考中...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
