<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置调试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .section h2 {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
            font-family: monospace;
            word-break: break-all;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }

        .warning {
            color: #ffc107;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 配置调试页面</h1>

        <div class="section">
            <h2>📋 当前配置</h2>
            <div class="info-item">
                <span class="info-label">API Token:</span>
                <span class="info-value" id="tokenValue">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Base URL:</span>
                <span class="info-value" id="baseUrlValue">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Project ID:</span>
                <span class="info-value" id="projectIdValue">-</span>
            </div>
        </div>

        <div class="section">
            <h2>🔍 配置检查</h2>
            <div class="info-item">
                <span class="info-label">Token 是否配置:</span>
                <span class="info-value" id="tokenConfigured">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Token 格式:</span>
                <span class="info-value" id="tokenFormat">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Base URL 格式:</span>
                <span class="info-value" id="baseUrlFormat">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Project ID 格式:</span>
                <span class="info-value" id="projectIdFormat">-</span>
            </div>
        </div>

        <div class="section">
            <h2>🧪 测试 API 连接</h2>
            <button onclick="testConnection()" id="testBtn">
                测试 API 连接
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在测试...</p>
            </div>

            <div class="status" id="status"></div>
        </div>

        <div class="section">
            <h2>📊 测试结果</h2>
            <div class="info-item">
                <span class="info-label">请求 URL:</span>
                <span class="info-value" id="requestUrl">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">状态码:</span>
                <span class="info-value" id="statusCode">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">响应时间:</span>
                <span class="info-value" id="responseTime">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">响应内容:</span>
                <span class="info-value" id="responseContent">-</span>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时显示配置
        window.addEventListener('load', () => {
            loadConfig();
            checkConfig();
        });

        function loadConfig() {
            const token = localStorage.getItem('api_token') || '';
            const baseUrl = localStorage.getItem('api_base_url') || 'https://hxf8rythx2.coze.site/stream_run';
            const projectId = localStorage.getItem('api_project_id') || '7612909369184960562';

            document.getElementById('tokenValue').textContent = token ? maskToken(token) : '(未配置)';
            document.getElementById('baseUrlValue').textContent = baseUrl;
            document.getElementById('projectIdValue').textContent = projectId;
        }

        function maskToken(token) {
            if (token.length <= 10) {
                return token;
            }
            return token.substring(0, 8) + '...' + token.substring(token.length - 4);
        }

        function checkConfig() {
            const token = localStorage.getItem('api_token') || '';
            const baseUrl = localStorage.getItem('api_base_url') || '';
            const projectId = localStorage.getItem('api_project_id') || '';

            // Token 是否配置
            const tokenConfigured = token && token !== '<YOUR_API_TOKEN>';
            document.getElementById('tokenConfigured').innerHTML = tokenConfigured
                ? '<span class="success">✅ 已配置</span>'
                : '<span class="error">❌ 未配置</span>';

            // Token 格式
            const tokenFormat = checkTokenFormat(token);
            document.getElementById('tokenFormat').innerHTML = tokenFormat;

            // Base URL 格式
            const baseUrlFormat = checkBaseUrlFormat(baseUrl);
            document.getElementById('baseUrlFormat').innerHTML = baseUrlFormat;

            // Project ID 格式
            const projectIdFormat = checkProjectIdFormat(projectId);
            document.getElementById('projectIdFormat').innerHTML = projectIdFormat;
        }

        function checkTokenFormat(token) {
            if (!token || token === '<YOUR_API_TOKEN>') {
                return '<span class="error">❌ 无效</span>';
            }
            if (token.length < 20) {
                return '<span class="warning">⚠️ 过短</span>';
            }
            return '<span class="success">✅ 有效</span>';
        }

        function checkBaseUrlFormat(baseUrl) {
            if (!baseUrl) {
                return '<span class="error">❌ 无效</span>';
            }
            if (!baseUrl.startsWith('https://')) {
                return '<span class="error">❌ 必须以 https:// 开头</span>';
            }
            return '<span class="success">✅ 有效</span>';
        }

        function checkProjectIdFormat(projectId) {
            if (!projectId) {
                return '<span class="error">❌ 无效</span>';
            }
            if (!/^\d+$/.test(projectId)) {
                return '<span class="error">❌ 必须是数字</span>';
            }
            return '<span class="success">✅ 有效</span>';
        }

        async function testConnection() {
            const token = localStorage.getItem('api_token');
            const baseUrl = localStorage.getItem('api_base_url') || 'https://hxf8rythx2.coze.site/stream_run';
            const projectId = localStorage.getItem('api_project_id') || '7612909369184960562';

            // 显示加载状态
            document.getElementById('loading').classList.add('show');
            document.getElementById('status').classList.remove('show');
            document.getElementById('testBtn').disabled = true;

            const startTime = Date.now();

            try {
                const response = await fetch(baseUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        text: '你好',
                        session_id: 'test_' + Date.now(),
                        project_id: projectId
                    })
                });

                const endTime = Date.now();
                const responseTime = endTime - startTime;

                // 显示请求信息
                document.getElementById('requestUrl').textContent = baseUrl;
                document.getElementById('statusCode').textContent = response.status + ' ' + response.statusText;
                document.getElementById('statusCode').className = 'info-value ' + (response.ok ? 'success' : 'error');
                document.getElementById('responseTime').textContent = responseTime + 'ms';

                // 显示状态
                const statusDiv = document.getElementById('status');
                statusDiv.classList.add('show');

                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ 连接成功！API 工作正常。';

                    // 显示响应内容（前100字符）
                    const text = await response.text();
                    document.getElementById('responseContent').textContent = text.substring(0, 100) + '...';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ 连接失败！状态码：${response.status}`;

                    // 显示错误信息
                    const text = await response.text();
                    document.getElementById('responseContent').textContent = text;
                }
            } catch (error) {
                const endTime = Date.now();
                document.getElementById('requestUrl').textContent = baseUrl;
                document.getElementById('statusCode').textContent = '请求失败';
                document.getElementById('statusCode').className = 'info-value error';
                document.getElementById('responseTime').textContent = (endTime - startTime) + 'ms';
                document.getElementById('responseContent').textContent = error.message;

                const statusDiv = document.getElementById('status');
                statusDiv.classList.add('show');
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ 连接失败！错误：${error.message}`;
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('testBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
